<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">

    <title>Hello, world!</title>
  </head>
  <body>
    <div class="container">
      <div class="row">
        {% for book_one, book_two in books %}
          <div class="card mb-3" style="width: 540px;">
            <div class="row no-gutters">
              <div class="col-md-4">
                <img src="{{book_one.img_src}}" class="card-img" alt={{book_one.title}}>
              </div>
              <div class="col-md-8">
                <div class="card-body">
                  <h5 class="card-title">{{book_one.title}}</h5>
                  <p class="card-text">{{book_one.author}}</p>
                  <p><a href="{{book_one.book_path|urlencode}}" target="_blank">Читай</a></p>
                  <p class="card-text"><small class="text-muted">Last updated 3 mins ago</small></p>
                </div>
              </div>
            </div>
          </div>

          <div class="card mb-3" style="width: 540px;">
            <div class="row no-gutters">
              <div class="col-md-4">
                <img src="{{book_two.img_src}}" class="card-img" alt={{book_two.title}}>
              </div>
              <div class="col-md-8">
                <div class="card-body">
                  <h5 class="card-title">{{book_two.title}}</h5>
                  <p class="card-text">{{book_two.author}}</p>
                  <p><a href="{{book_two.book_path|urlencode}}" target="_blank">Читай</a></p>
                  <p class="card-text"><small class="text-muted">Last updated 3 mins ago</small></p>
                </div>
              </div>
            </div>
          </div>
          <div class="w-100"></div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
